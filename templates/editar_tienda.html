<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Editar Tienda</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <nav class="mb-4">
                    <a href="/tiendas" class="btn btn-sm btn-secondary">← Volver a Tiendas</a>
                </nav>

                <div class="card shadow">
                    <div class="card-header bg-warning text-dark">
                        <h3 class="mb-0">Editar Tienda: {{ tienda.nombre }}</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Nombre de la Tienda:</label>
                                <input type="text" name="nombre" class="form-control" value="{{ tienda.nombre }}" required>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Hora de Apertura:</label>
                                    <input type="time" name="apertura" class="form-control" value="{{ tienda.apertura }}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Hora de Cierre:</label>
                                    <input type="time" name="cierre" class="form-control" value="{{ tienda.cierre }}" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-3">
                                <button type="submit" class="btn btn-primary btn-lg">Actualizar Datos</button>
                                <a href="/tiendas" class="btn btn-outline-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="mt-4 alert alert-warning small">
                    <strong>Nota:</strong> Al cambiar el nombre de la tienda, los empleados asignados se mantendrán vinculados a ella automáticamente.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
