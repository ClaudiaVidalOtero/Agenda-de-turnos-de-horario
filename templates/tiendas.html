<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gestionar Tiendas</title>
</head>
<body class="container mt-5">
    <nav class="mb-4"><a href="/" class="btn btn-sm btn-secondary">← Volver al Inicio</a></nav>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h4>Añadir Tienda</h4>
                <form action="/tiendas" method="POST">
                    <div class="mb-3">
                        <label>Nombre:</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Apertura:</label>
                        <input type="time" name="apertura" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Cierre:</label>
                        <input type="time" name="cierre" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Guardar Tienda</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <h3>Tiendas Registradas</h3>
            <table class="table table-hover bg-white shadow-sm rounded">
                <thead class="table-dark">
                    <tr><th>Nombre</th><th>Horario</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                    {% for t in tiendas %}
                    <tr>
                        <td>{{ t.nombre }}</td>
                        <td>{{ t.apertura }} - {{ t.cierre }}</td>
                        <td>
                            <a href="/editar_tienda/{{ t.id }}" class="btn btn-warning btn-sm">Editar</a>
                            <a href="/eliminar_tienda/{{ t.id }}" class="btn btn-danger btn-sm" onclick="return confirm('¿Borrar tienda?')">Borrar</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
