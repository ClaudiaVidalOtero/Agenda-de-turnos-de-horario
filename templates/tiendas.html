<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Tiendas</title>
</head>

<body class="container mt-5">

<a href="/" class="btn btn-secondary mb-3">← Volver</a>

<div class="row">

    <div class="col-md-4">
        <div class="card p-4 shadow-sm">
            <h4>Nueva Tienda</h4>

            <form method="POST">

                <input type="text" name="nombre" placeholder="Nombre" class="form-control mb-2" required>

                <label>Apertura</label>
                <input type="time" name="apertura" class="form-control mb-2">

                <label>Cierre</label>
                <input type="time" name="cierre" class="form-control mb-2">

                <label>Mín empleados mañana</label>
                <input type="number" name="min_manana" class="form-control mb-2" required>

                <label>Mín empleados tarde</label>
                <input type="number" name="min_tarde" class="form-control mb-2" required>

                <button class="btn btn-success w-100">Guardar</button>

            </form>
        </div>
    </div>

    <div class="col-md-8">
        <h3>Tiendas</h3>

        <table class="table table-hover">
            <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Horario</th>
                <th>Mínimos</th>
            </tr>
            </thead>

            <tbody>
            {% for t in tiendas %}
            <tr>
                <td>{{ t.nombre }}</td>
                <td>{{ t.apertura }} - {{ t.cierre }}</td>
                <td>M: {{ t.min_manana }} | T: {{ t.min_tarde }}</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
