<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gestor de Horarios</title>
</head>
<body class="bg-light">
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">Gestor de Turnos</h1>
            <p class="lead text-muted">Panel de control para el Manager</p>
        </header>

        <div class="row justify-content-center g-4">
            <div class="col-md-5">
                <div class="card shadow border-0 h-100">
                    <div class="card-body text-center p-5">
                        <div class="display-1 mb-3">🏪</div>
                        <h3>Tiendas</h3>
                        <p>Configura locales, aperturas y cierres.</p>
                        <a href="/tiendas" class="btn btn-primary btn-lg w-100">Ir a Tiendas</a>
                    </div>
                </div>
            </div>
            <div class="col-md-5">
                <div class="card shadow border-0 h-100">
                    <div class="card-body text-center p-5">
                        <div class="display-1 mb-3">👥</div>
                        <h3>Empleados</h3>
                        <p>Gestiona el personal y sus horas extra.</p>
                        <a href="/empleados" class="btn btn-primary btn-lg w-100">Ir a Personal</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-5">
            <div class="col-md-4 text-center">
                <div class="d-grid gap-3">
                    <a href="/configuracion" class="btn btn-outline-dark btn-lg">⚙️ Configuración del Sistema</a>
                    <a href="/exportar" class="btn btn-success btn-lg shadow">📥 Generar Horarios (Excel)</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
