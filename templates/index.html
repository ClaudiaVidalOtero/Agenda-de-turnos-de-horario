<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gestor de Horarios</title>
</head>

<body class="bg-light">
<div class="container py-5">

    <header class="text-center mb-5">
        <h1 class="display-4 fw-bold text-primary">Gestor de Turnos</h1>
        <p class="lead text-muted">Panel de control para el Manager</p>
    </header>

    <div class="row justify-content-center g-4">

        <!-- TIENDAS -->
        <div class="col-md-5">
            <div class="card shadow border-0 h-100">
                <div class="card-body text-center p-5">
                    <div class="display-1 mb-3">🏪</div>
                    <h3>Tiendas</h3>
                    <a href="/tiendas" class="btn btn-primary btn-lg w-100">Gestionar</a>
                </div>
            </div>
        </div>

        <!-- EMPLEADOS -->
        <div class="col-md-5">
            <div class="card shadow border-0 h-100">
                <div class="card-body text-center p-5">
                    <div class="display-1 mb-3">👥</div>
                    <h3>Empleados</h3>
                    <a href="/empleados" class="btn btn-primary btn-lg w-100">Gestionar</a>
                </div>
            </div>
        </div>

    </div>

    <!-- GENERADOR -->
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">

            <div class="card shadow p-4">
                <h4 class="text-center mb-3">🤖 Generar Horario</h4>

                <form method="POST" action="/generar">

                    <div class="mb-3">
                        <label>Tienda:</label>
                        <select name="tienda_id" class="form-select" required>
                            {% for t in tiendas %}
                                <option value="{{ t.id }}">{{ t.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Seleccionar empleados:</label>
                        {% for e in empleados %}
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="empleados" value="{{ e.id }}">
                            <label class="form-check-label">{{ e.nombre }}</label>
                        </div>
                        {% endfor %}
                    </div>

                    <button class="btn btn-danger w-100">Generar horario</button>

                </form>

            </div>

        </div>
    </div>

</div>
</body>
</html>
