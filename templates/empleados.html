<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Gestionar Empleados</title>
</head>

<body class="container mt-5">

<nav class="mb-4">
    <a href="/" class="btn btn-sm btn-secondary">← Volver</a>
</nav>

<div class="row">

    <!-- FORM -->
    <div class="col-md-4">
        <div class="card p-4 shadow-sm border-primary">
            <h4>Nuevo Empleado</h4>

            <form action="/empleados" method="POST">

                <div class="mb-2">
                    <label>Nombre:</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>

                <div class="mb-2">
                    <label>Tienda:</label>
                    <select name="tienda_id" class="form-select" required>
                        {% for t in tiendas %}
                        <option value="{{ t.id }}">{{ t.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-2">
                    <label>Jornada:</label>
                    <select name="tipo_jornada" class="form-select">
                        <option value="Completa">Completa</option>
                        <option value="Parcial">Parcial</option>
                    </select>
                </div>

                <div class="mb-2">
                    <label>Horas Extra:</label>
                    <input type="number" name="horas_extra" class="form-control" value="0">
                </div>

                <hr>

                <div class="mb-2">
                    <label>Preferencia turno:</label>
                    <select name="preferencia_turno" class="form-select">
                        <option value="indiferente">Indiferente</option>
                        <option value="mañana">Mañana</option>
                        <option value="tarde">Tarde</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Día libre preferido:</label>
                    <select name="dia_libre" class="form-select">
                        <option value="">Sin preferencia</option>
                        <option value="0">Lunes</option>
                        <option value="1">Martes</option>
                        <option value="2">Miércoles</option>
                        <option value="3">Jueves</option>
                        <option value="4">Viernes</option>
                        <option value="5">Sábado</option>
                        <option value="6">Domingo</option>
                    </select>
                </div>

                <button class="btn btn-primary w-100">Registrar</button>

            </form>
        </div>
    </div>

    <!-- LISTA -->
    <div class="col-md-8">
        <h3>Lista</h3>

        <table class="table table-striped">
            <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Tienda</th>
                <th>Preferencias</th>
            </tr>
            </thead>

            <tbody>
            {% for e in empleados %}
            <tr>
                <td>{{ e.nombre }}</td>
                <td>{{ e.tienda_id }}</td>
                <td>{{ e.preferencia_turno }} | Día libre: {{ e.dia_libre }}</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
